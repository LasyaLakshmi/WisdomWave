<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Quiz Results - WisdomWave</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: "Segoe UI", sans-serif;
      background: linear-gradient(to right, #FFBB98, #FBE0C3);
      color: #333;
    }
    .logo {
      position: absolute;
      top: 10px;
      left: 10px;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      object-fit: cover;
    }
nav {
  box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
  background-color: #333;
  padding: 15px 70px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
}

nav ul {
  list-style: none;
  margin: 0;
  padding: 0;
  display: flex;
  flex-wrap: wrap;
}

nav ul li {
  margin-right: 30px;
}

nav ul li a {
  color: white;
  text-decoration: none;
  font-weight: bold;
  padding: 8px 13px;
  border-radius: 8px;
  transition: background-color 0.3s ease, color 0.3s ease;
}

nav ul li a:hover {
  background-color: white;
  color: black;
}

.search-section {
  display: flex;
  align-items: center;
  gap: 20px;
}

.search-section input {
  padding: 8px;
  border: 1px solid #ccc;
  border-radius: 10px;
  width: 200px;
}

.search-section button {
  padding: 8px 16px;
  background-color: #fff;
  color: #333;
  border: none;
  border-radius: 5px;
  cursor: pointer;
  transition: background-color 0.2s, color 0.2s;
}

.search-section button:hover {
  background-color: orange;
  color: black;
}
    .results-container {
      max-width: 800px;
      margin: 60px auto;
      padding: 40px;
      background: white;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      text-align: center;
    }
    .score-display {
      font-size: 2.5rem;
      color: #344648;
      margin-bottom: 20px;
    }
    .feedback {
      font-size: 1.5rem;
      margin-bottom: 30px;
      color: #FF6B6B;
    }
    .answer-details {
      text-align: left;
      margin: 30px 0;
    }
    .question-result {
      margin-bottom: 20px;
      padding: 15px;
      border-radius: 10px;
      background: #f9f9f9;
    }
    .correct {
      border-left: 5px solid #4CAF50;
    }
    .incorrect {
      border-left: 5px solid #FF5252;
    }
    .btn-row {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 30px;
    }
    .home-btn, .next-btn {
      padding: 14px 20px;
      font-size: 1.1rem;
      font-weight: bold;
      color: white;
      background: #404040;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      text-decoration: none;
      display: inline-block;
    }
    .home-btn:hover, .next-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.3);
    }
    code {
      background: #f0f0f0;
      padding: 2px 4px;
      border-radius: 3px;
      font-family: monospace;
    }
  </style>
</head>
<body>
  <nav>
    <ul>
      <img class="logo" src="logo1.jpg" alt="Logo">
      <li><a href="Wisdomwave_Home.html">Home</a></li>
      <li><a href="Tutorialsjava.html">Tutorials</a></li>
      <li><a href="Quizzes.html">Quizzes</a></li>
      <li><a href="java.html">Java</a></li>
      <li><a href="c.html">C</a></li>
    </ul>
    <div class="search-section">
      <input type="text" placeholder="Search for Courses...">
      <button>Search</button>
    </div>
    <ul>
      <li><a href="certification.html">Certification</a></li>
      <li><a href="plus.html">Plus✨</a></li>
      <li><a href="reviews.html">Reviews</a></li>
      <li><a href="contact.html">Contact Us</a></li>
    </ul>
  </nav>

  <div class="results-container">
    <h2>📝 Quiz Results</h2>
    <div class="score-display" id="scoreDisplay"></div>
    <div class="feedback" id="feedback"></div>
    
    <div class="answer-details" id="answerDetails"></div>
    
    <div class="btn-row">
      <a href="Wisdomwave_Home.html" class="home-btn">🏠 Home</a>
      <a href="java-syntax.html" class="next-btn">➡ Next Quiz</a>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const results = JSON.parse(localStorage.getItem('javaBasicQuizResults'));
      const scoreDisplay = document.getElementById('scoreDisplay');
      const feedback = document.getElementById('feedback');
      const answerDetails = document.getElementById('answerDetails');

      if (results) {
        // Display score
        scoreDisplay.textContent = `${results.score} / ${results.total} Correct Answers`;
        
        // Show motivational feedback
        const percentage = (results.score / results.total) * 100;
        let message;
        if (percentage >= 80) message = "🎉 Congratulations! You're a Java expert!";
        else if (percentage >= 60) message = "👍 Great job! You're doing well!";
        else message = "💪 Keep practicing! You'll get better!";
        feedback.textContent = message;

        // Show detailed answers
        for (let i = 1; i <= results.total; i++) {
          const qKey = `q${i}`;
          const userAnswer = results.userAnswers[qKey];
          const isCorrect = userAnswer === results.correctAnswers[qKey];
          
          const questionDiv = document.createElement('div');
          questionDiv.className = `question-result ${isCorrect ? 'correct' : 'incorrect'}`;
          
          questionDiv.innerHTML = `
            <h3>Question ${i}: ${isCorrect ? '✓ Correct' : '✗ Incorrect'}</h3>
            ${!isCorrect ? `
              <p><strong>Your answer:</strong> ${userAnswer || 'Not answered'}</p>
              <p><strong>Correct answer:</strong> ${results.correctAnswers[qKey]}</p>
            ` : ''}
          `;
          
          answerDetails.appendChild(questionDiv);
        }
      } else {
        scoreDisplay.textContent = "No results found!";
        feedback.textContent = "Please complete the quiz first.";
      }
    });
  </script>
</body>
</html>
